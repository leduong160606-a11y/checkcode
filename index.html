<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hệ thống Chấm bài tự động</title>
    <!-- Thư viện để hiển thị code đẹp -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f1f5f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; min-height: 100vh; display: flex; flex-direction: column; }
        
        /* Menu */
        nav { background: var(--card); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; }
        
        /* Container chính */
        .container { max-width: 800px; margin: 40px auto; padding: 20px; background: var(--card); border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); flex: 1; }
        
        textarea { width: 100%; height: 250px; background: #0f172a; color: #a5f3fc; border: 1px solid #334155; border-radius: 8px; padding: 15px; box-sizing: border-box; font-family: 'Courier New', monospace; margin: 10px 0; }
        
        /* Nút Gửi */
        button { background: var(--accent); color: #000; border: none; padding: 12px 25px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:disabled { background: #64748b; cursor: not-allowed; }
        
        /* Hiệu ứng xoay */
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #000; border-radius: 50%; width: 16px; height: 16px; animation: spin 1s linear infinite; display: inline-block; margin-right: 8px; vertical-align: middle; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        #ai-result { margin-top: 20px; padding: 20px; border-left: 4px solid var(--accent); background: #0f172a; min-height: 50px; }
        
        /* Footer */
        footer { background-color: #1e293b; padding: 30px; text-align: center; border-top: 1px solid #334155; margin-top: auto; }
        .contact-info { display: flex; justify-content: center; gap: 30px; color: var(--text); }
    </style>
</head>
<body>

<nav>
    <div style="font-weight: bold; font-size: 1.2rem;">⚡ CodeAutoChecker</div>
    <div>
        <button onclick="clearStorage()" style="background:transparent; color:#ef4444; border:1px solid #ef4444; padding:5px 10px; cursor:pointer;">Xóa Code Cũ</button>
    </div>
</nav>

<div class="container">
    <h1>Nộp bài tập lập trình</h1>
    <input type="text" id="name" placeholder="Tên sinh viên" style="width: 100%; padding: 10px; border-radius: 6px; border: none; margin-bottom: 10px; background:#0f172a; color:white;">
    
    <textarea id="code" placeholder="Dán code tại đây..."></textarea>
    
    <button id="submitBtn" onclick="submitCode()">Gửi bài</button>
<div id="ai-result">Kết quả chấm bài sẽ hiển thị tại đây...</div>
</div>

<footer>
    <p style="margin-bottom: 10px; color: #94a3b8;">Kết nối với Admin qua:</p>
    <div class="contact-info">
        <p style="margin: 0;">📞 SĐT: <strong>0835.888.806</strong></p> 
        <p style="margin: 0;">🌐 Facebook: <a href="https://facebook.com/mingd06" target="_blank" style="color: var(--accent); text-decoration: none;">Tại đây</a></p>
    </div>
    <p style="font-size: 12px; color: #475569; margin-top: 15px;">© 2026 Created by LeDuong</p>
</footer>

<script>
    const codeArea = document.getElementById('code');
    const submitBtn = document.getElementById('submitBtn');
    
    // Tự động lưu code vào bộ nhớ trình duyệt
    codeArea.value = localStorage.getItem('saved_code') || '';
    codeArea.addEventListener('input', () => localStorage.setItem('saved_code', codeArea.value));

    function clearStorage() { 
        localStorage.removeItem('saved_code'); 
        codeArea.value = ''; 
        alert('Đã xóa bộ nhớ!'); 
    }

    async function submitCode() {
        const resultDiv = document.getElementById('ai-result');
        
        // Hiện loader
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="loader"></span> Đang chấm...';
        resultDiv.innerHTML = "Đang phân tích code, vui lòng chờ...";
        
        try {
            const response = await fetch('/submit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    student_name: document.getElementById('name').value,
                    code_content: codeArea.value
                })
            });
            const result = await response.json();
            resultDiv.innerHTML = result.ai_feedback ? marked.parse(result.ai_feedback) : "Lỗi hệ thống.";
        } catch (error) {
            resultDiv.innerText = "Lỗi kết nối server!";
        }
        
        // Phục hồi nút
        submitBtn.disabled = false;
        submitBtn.innerText = "Gửi bài";
    }
</script>
</body>
</html>
