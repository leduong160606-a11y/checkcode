<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeAutoChecker - Professional</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f1f5f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; min-height: 100vh; display: flex; flex-direction: column; }
        
        nav { background: var(--card); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; }
        
        /* Full màn hình: dùng width 98% và max-width rất lớn */
        .container { width: 98%; max-width: 1400px; margin: 20px auto; padding: 30px; background: var(--card); border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.4); box-sizing: border-box; }
        
        h1 { font-size: 2rem; margin-top: 0; color: var(--accent); }
        
        input { width: 100%; background: #0f172a; color: #fff; border: 1px solid #334155; border-radius: 8px; padding: 15px; box-sizing: border-box; font-size: 16px; margin-bottom: 20px; }
        
        textarea { width: 100%; height: 500px; background: #0f172a; color: #fff; border: 1px solid #334155; border-radius: 8px; padding: 20px; box-sizing: border-box; font-size: 16px; margin-bottom: 20px; font-family: 'Courier New', monospace; resize: vertical; }
        
        button { width: 100%; padding: 18px; background: var(--accent); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 18px; transition: 0.3s; }
        
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #000; border-radius: 50%; width: 18px; height: 18px; animation: spin 1s linear infinite; display: inline-block; margin-right: 10px; vertical-align: middle; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        #ai-result { margin-top: 30px; padding: 25px; background: #0f172a; border-radius: 8px; border-left: 6px solid var(--accent); line-height: 1.7; }
        
        /* Footer trang trọng hơn */
        footer { padding: 50px 20px; text-align: center; background: #0f172a; margin-top: auto; border-top: 1px solid #334155; }
        .footer-content { max-width: 800px; margin: 0 auto; }
        .footer-title { font-size: 1.2rem; font-weight: bold; margin-bottom: 20px; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
        .footer-links { display: flex; justify-content: center; gap: 40px; font-size: 1.1rem; }
        .footer-links a { color: var(--text); text-decoration: none; transition: 0.3s; }
        .footer-links a:hover { color: var(--accent); }
    </style>
</head>
<body>

<nav>
    <div style="font-weight: bold; font-size: 1.4rem;">⚡ CodeAutoChecker</div>
    <button onclick="clearStorage()" style="width: auto; padding: 8px 16px; background: transparent; color: #ef4444; border: 1px solid #ef4444; font-size: 0.9rem;">Xóa bộ nhớ</button>
</nav>

<div class="container">
    <h1>Hệ thống nộp bài tập lập trình</h1>
    <input type="text" id="name" placeholder="Nhập tên sinh viên...">
    <textarea id="code" placeholder="Dán code của bạn tại đây..."></textarea>
    <button id="submitBtn" onclick="submitCode()">Gửi bài kiểm tra</button>
    <div id="ai-result">Kết quả kiểm tra sẽ hiển thị tại đây...</div>
</div>

<footer>
    <div class="footer-content">
        <div class="footer-title">Thông tin hỗ trợ kỹ thuật</div>
        <div class="footer-links">
            <span>📞 Hotline: <strong>0835.888.806</strong></span>
            <span>🌐 Facebook: <a href="https://facebook.com/mingd06" target="_blank">Lê Minh Đương</a></span>
        </div>
        <p style="margin-top: 30px; font-size: 0.9rem; color: #475569;">© 2026 Hệ thống được phát triển bởi LeDuong. Đảm bảo tính chính xác và bảo mật.</p>
    </div>
</footer>

<script>
    const codeArea = document.getElementById('code');
    const submitBtn = document.getElementById('submitBtn');
    
    codeArea.value = localStorage.getItem('saved_code') || '';
    codeArea.addEventListener('input', () => localStorage.setItem('saved_code', codeArea.value));

    function clearStorage() { localStorage.removeItem('saved_code'); codeArea.value = ''; alert('Đã xóa!'); }

    async function submitCode() {
        const resultDiv = document.getElementById('ai-result');
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="loader"></span> Đang kiểm tra...';
        resultDiv.innerHTML = "Đang phân tích...";
        
        try {
            const res = await fetch('/submit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ student_name: document.getElementById('name').value, code_content: codeArea.value })
            });
            const data = await res.json();
            resultDiv.innerHTML = data.ai_feedback ? marked.parse(data.ai_feedback) : "Lỗi hệ thống.";
        } catch (e) {
            resultDiv.innerText = "Lỗi kết nối!";
        }
        submitBtn.disabled = false;
        submitBtn.innerText = "Gửi bài kiểm tra";
    }
</script>
</body>
</html>
