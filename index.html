<!DOCTYPE html>
<html>
<head>
    <title>Hệ thống Chấm bài tự động</title>
    <style>
        body { font-family: sans-serif; padding: 50px; }
        textarea { width: 100%; height: 200px; margin-bottom: 10px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; }
        /* Style cho biểu tượng quay */
.loader {
    border: 4px solid #f3f3f3;
    border-top: 4px solid #3498db;
    border-radius: 50%;
    width: 20px;
    height: 20px;
    animation: spin 1s linear infinite;
    display: inline-block;
    vertical-align: middle;
    margin-right: 10px;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}
#ai-result {
    background-color: #f9f9f9;
    border-radius: 8px;
    border-left: 5px solid #007bff; /* Tạo điểm nhấn bên trái */
    padding: 20px;
    margin-top: 20px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1); /* Tạo hiệu ứng nổi */
}
    </style>
</head>
<footer style="background-color: #f8f9fa; padding: 30px; text-align: center; border-top: 1px solid #ddd; margin-top: 50px; font-family: sans-serif;">
    <p style="margin-bottom: 10px; color: #555;">Kết nối với Admin qua:</p>
    <div style="display: flex; justify-content: center; gap: 30px;">
        <p style="margin: 0;">📞 SĐT: <strong>0835.888.806</strong></p> <p style="margin: 0;">🌐 Facebook: <a href="https://facebook.com/mingd06" target="_blank" style="color: #007bff; text-decoration: none;">Tại đây</a></p>
    </div>
    <p style="font-size: 12px; color: #999; margin-top: 15px;">© 2026 Created by LeDuong</p>
</footer>
<body>
    <nav style="background-color: #ffffff; padding: 15px 50px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); font-family: sans-serif;">
    <div style="font-size: 20px; font-weight: bold; color: #333;">Hệ thống Chấm bài</div>
    <div style="display: flex; gap: 20px;">
        <a href="/" style="text-decoration: none; color: #333; font-weight: 500;">Trang chủ</a>
        <a href="#" style="text-decoration: none; color: #666;">Hướng dẫn</a>
    </div>
</nav>
    <h1>Nộp bài tập lập trình</h1>
    <input type="text" id="name" placeholder="Tên sinh viên"><br><br>
    <textarea id="code" placeholder="Dán code Python của bạn vào đây..."></textarea><br>
    <button onclick="submitCode()">Gửi bài</button>
    <div id="ai-result" style="margin-top: 20px; white-space: pre-wrap; border: 1px solid #ddd; padding: 10px;">
    Kết quả AI sẽ hiển thị tại đây...
</div>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
   async function submitCode() {
        const btn = document.querySelector('button');
        const resultDiv = document.getElementById('ai-result');
        
        // Khóa nút và hiện loading
        btn.disabled = true;
        btn.innerHTML = '<span class="loader"></span> Đang chấm bài...'; 
        resultDiv.innerText = "Đang phân tích code, vui lòng chờ...";

        const data = {
            student_name: document.getElementById('name').value,
            code_content: document.getElementById('code').value
        };

        try {
            const response = await fetch('/submit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            const result = await response.json();
            
            // Hiển thị kết quả bằng marked để chữ đẹp hơn và không bị undefined
            if (result.ai_feedback) {
                resultDiv.innerHTML = marked.parse(result.ai_feedback);
            } else {
                resultDiv.innerHTML = "Có lỗi xảy ra: " + JSON.stringify(result);
            }
        } catch (error) {
            resultDiv.innerText = "Lỗi kết nối tới server, vui lòng thử lại!";
        }
        
        // Khôi phục nút bấm
        btn.disabled = false;
        btn.innerText = "Gửi bài";
    }
    </script>
</body>
</html>
